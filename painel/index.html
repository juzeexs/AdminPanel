<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Painel de desempenho — dashboard interativo de métricas de negócio." />
    <meta name="theme-color" content="#f7f6f2" />
    <title>Painel de Desempenho</title>

    <!-- Fonte Google: DM Sans (clean e profissional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      /* Variáveis globais de tema */
      :root {
        --color-bg:        #f7f6f2;
        --color-surface:   #ffffff;
        --color-text:      #1a1a18;
        --color-muted:     #888780;
        --color-border:    #e5e4de;
        --color-card:      #F5F5F2;

        --color-blue:      #378ADD;
        --color-green:     #1D9E75;
        --color-orange:    #D85A30;
        --color-amber:     #BA7517;

        --color-ok-bg:     #EAF3DE;
        --color-ok-text:   #3B6D11;
        --color-warn-bg:   #FAEEDA;
        --color-warn-text: #854F0B;
        --color-info-bg:   #E6F1FB;
        --color-info-text: #185FA5;

        --font-base: 'DM Sans', system-ui, -apple-system, sans-serif;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: var(--font-base);
        background-color: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1, h2, h3, h4, h5, h6 {
        font-weight: 500;
        line-height: 1.3;
        color: var(--color-text);
      }

      p {
        line-height: 1.6;
        color: var(--color-muted);
      }

      button {
        font-family: var(--font-base);
        cursor: pointer;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      canvas {
        display: block;
      }

      img, svg {
        display: block;
        max-width: 100%;
      }

      a {
        color: var(--color-blue);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Scrollbar customizada (Chrome/Edge) */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
